# Profile: test
spring.config.activate.on-profile=test

# Datasource: H2 in-memory database
spring.datasource.url=jdbc:h2:mem:fooddelivery_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Disable Spring Security for integration tests if needed
spring.security.enabled=false

# H2 Console for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable SQL init by default; if SQL init is ever needed, enable below
# spring.sql.init.mode=always
# spring.sql.init.schema-locations=classpath:schema.sql
